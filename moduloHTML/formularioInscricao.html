<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de inscricao</title>
</head>
<body>

    <header>
        <h1>Formulário de inscrição docente</h1>
    </header>

    <section id="formulario">
        <form action="">

                <label for="nome">Nome completo: </label>
                <input type="text" id="nome" name="nome" required> <br>

                <label for="email">E-mail: </label>
                <input type="email" id="email" name="email" required> <br>

                <label for="idade">idade: </label>
                <input type="number" id="idade" name="idade" min="24" max="60" required> <br>

                <label for="materia">Matéria que deseja lecionar: </label>
                <select name="materia" id="material">
                    <option value="mat">Matemática</option>
                    <option value="port">Portuguê</option>
                    <option value="bio">Biologia</option>
                    <option value="cien">Ciências</option>
                    <option value="hist">História</option>
                    <option value="geo">Geografia</option>
                    <option value="artes">Artes</option>
                </select>

                <br>

                <label for="escolaridade">Nível de escolaridade: </label>
                <select name="escolaridade" id="escolaridde">
                    <option value="supCompleto">Superior completo</option>
                    <option value="cursandoMest">Cursando mestrado</option>
                    <option value="mestCompleto">Mestrado completo</option>
                    <option value="cursandoDout">Cursando doutorado</option>
                    <option value="doutCompleto">Doutorado completo</option>
                </select>

                <br>

                <label for="sobreSi">Sobre si mesmo: </label>
                <textarea name="sobreSi" id="sobreSi" cols="20" rows="5" maxlength="200" required></textarea> <br>

                <br>

                <input type="submit" value="Enviar mensagem">
            </form>

    </section>
    
</body>
</html>
